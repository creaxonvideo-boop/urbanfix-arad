<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UrbanFix Arad</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0A0C10;color:#E8EAF0;font-family:'Syne',sans-serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#12151C}::-webkit-scrollbar-thumb{background:#2A2F3E;border-radius:2px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;min-width:240px;background:#12151C;border-right:1px solid #2A2F3E;display:flex;flex-direction:column}
.brand{padding:18px 20px;border-bottom:1px solid #2A2F3E;font-size:20px;font-weight:800;color:#E8EAF0}
.brand span{color:#FF6B35}
.nav{padding:10px 0;flex:1}
.ni{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:#8B92A8;font-size:13px;font-weight:600;border-left:3px solid transparent}
.ni:hover{color:#E8EAF0;background:#1A1E28}
.ni.on{color:#FF6B35;background:rgba(255,107,53,.08);border-left-color:#FF6B35}
.ni.adm.on{color:#7C4DFF;background:rgba(124,77,255,.12);border-left-color:#7C4DFF}
.badge{margin-left:auto;background:#FF6B35;color:#fff;font-size:10px;padding:2px 6px;border-radius:10px;font-weight:700;font-family:monospace}
.badge.pu{background:#7C4DFF}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:#12151C;border-bottom:1px solid #2A2F3E;display:flex;align-items:center;padding:0 20px;gap:10px}
.topbar-title{flex:1;font-size:15px;font-weight:700}
.btn{padding:7px 16px;border-radius:6px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#FF6B35;color:#fff}
.btn-primary:hover{background:#ff7f50}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:#1A1E28;color:#8B92A8;border:1px solid #2A2F3E}
.btn-ghost:hover{color:#E8EAF0}
.btn-green{background:rgba(0,230,118,.12);color:#00E676;border:1px solid rgba(0,230,118,.3)}
.btn-red{background:rgba(255,23,68,.12);color:#FF1744;border:1px solid rgba(255,23,68,.3)}
.btn-pu{background:#7C4DFF;color:#fff}
.page{flex:1;overflow-y:auto;padding:20px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:#12151C;border:1px solid #2A2F3E;border-radius:10px;padding:16px}
.stat-val{font-size:28px;font-weight:800;font-family:monospace}
.stat-lbl{font-size:11px;color:#555D75;margin-top:4px;text-transform:uppercase;letter-spacing:.8px}
.map-wrap{background:#1A1E28;border-radius:10px;overflow:hidden;border:1px solid #2A2F3E;margin-bottom:20px;position:relative}
.map-canvas{width:100%;height:360px;position:relative;overflow:hidden;background:#1a1f2e;cursor:crosshair}
.map-pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:2}
.map-pin:hover{z-index:3}
.pin-body{width:28px;height:28px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.3);box-shadow:0 2px 8px rgba(0,0,0,.5)}
.pin-icon{transform:rotate(45deg);font-size:12px}
.pin-votes{position:absolute;top:-8px;right:-8px;background:#FF6B35;color:#fff;font-size:9px;font-family:monospace;font-weight:700;padding:1px 4px;border-radius:8px;min-width:18px;text-align:center}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#8B92A8}
.icard{background:#12151C;border:1px solid #2A2F3E;border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;gap:14px;transition:all .15s}
.icard:hover,.icard.sel{border-color:#FF6B35;background:rgba(255,107,53,.04)}
.vote-col{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:40px}
.vote-btn{width:28px;height:28px;border-radius:50%;background:#222736;border:1px solid #2A2F3E;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.vote-btn:hover,.vote-btn.voted{background:#FF6B35;border-color:#FF6B35}
.vote-count{font-size:18px;font-weight:800;font-family:monospace;color:#E8EAF0}
.vote-lbl{font-size:9px;color:#555D75;font-family:monospace;text-transform:uppercase}
.ibody{flex:1;min-width:0}
.itag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-family:monospace;font-weight:700}
.ititle{font-size:14px;font-weight:700;margin:6px 0 4px;color:#E8EAF0;line-height:1.3}
.idesc{font-size:12px;color:#8B92A8;line-height:1.5;margin-bottom:8px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.imeta{display:flex;align-items:center;gap:10px;font-size:11px;color:#555D75;font-family:monospace;flex-wrap:wrap}
.sbadge{padding:2px 8px;border-radius:20px;font-size:10px;font-family:monospace;font-weight:700}
.sbadge.act{background:rgba(255,107,53,.15);color:#FF6B35}
.sbadge.res{background:rgba(0,230,118,.15);color:#00E676}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:4px 10px;border-radius:20px;border:1px solid #2A2F3E;background:transparent;color:#8B92A8;font-size:11px;font-family:monospace;cursor:pointer}
.chip:hover,.chip.on{background:#222736;color:#E8EAF0;border-color:#FF6B35}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.dialog{background:#12151C;border:1px solid #2A2F3E;border-radius:16px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 4px 24px rgba(0,0,0,.55)}
.dialog-hdr{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.dialog-title{font-size:18px;font-weight:800;color:#E8EAF0}
.dialog-close{width:32px;height:32px;border-radius:50%;background:#1A1E28;border:1px solid #2A2F3E;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#8B92A8}
.dialog-body{padding:0 20px 20px}
.fg{margin-bottom:16px}
.fl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#555D75;margin-bottom:6px;font-family:monospace}
.fi{width:100%;background:#1A1E28;border:1px solid #2A2F3E;border-radius:6px;padding:10px 12px;color:#E8EAF0;font-family:'Syne',sans-serif;font-size:13px;outline:none}
.fi:focus{border-color:#FF6B35}
.ftxt{resize:vertical;min-height:80px}
.type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.type-opt{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:6px;border:1px solid #2A2F3E;cursor:pointer;background:#1A1E28;font-size:12px;font-weight:600;color:#E8EAF0}
.type-opt:hover{background:#222736}
.type-opt.on{background:rgba(255,255,255,.05)}
.coord-box{background:#222736;border-radius:6px;padding:8px 12px;font-size:11px;font-family:monospace;color:#00E5FF;display:flex;align-items:center;gap:6px;margin-bottom:16px}
.note{font-size:11px;color:#555D75;font-family:monospace;margin-bottom:14px;line-height:1.6;background:#1A1E28;border-radius:6px;padding:8px 12px;border:1px solid #2A2F3E}
.toast{position:fixed;bottom:20px;right:20px;background:#12151C;border:1px solid #2A2F3E;border-radius:10px;padding:12px 16px;font-size:13px;z-index:200;display:flex;align-items:center;gap:8px;box-shadow:0 4px 24px rgba(0,0,0,.55);color:#E8EAF0;animation:ts .3s ease}
@keyframes ts{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
.rate-banner{display:flex;align-items:center;gap:12px;background:rgba(255,23,68,.1);border:1px solid rgba(255,23,68,.35);border-radius:10px;padding:12px 16px;margin-bottom:16px}
.adm-gate{display:flex;align-items:center;justify-content:center;height:100%;padding:20px}
.adm-card{background:#12151C;border:1px solid #7C4DFF;border-radius:16px;padding:36px;width:100%;max-width:380px;box-shadow:0 0 40px rgba(124,77,255,.2)}
.adm-err{background:rgba(255,23,68,.12);border:1px solid rgba(255,23,68,.35);border-radius:6px;padding:10px 14px;font-size:12px;color:#FF1744;font-family:monospace;margin-bottom:14px;text-align:center}
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:#1A1E28;padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#555D75;font-family:monospace;text-align:left;border-bottom:1px solid #2A2F3E}
.tbl td{padding:12px 14px;font-size:12px;border-bottom:1px solid #2A2F3E;color:#E8EAF0;vertical-align:middle}
.tbl tr:hover td{background:#1A1E28}
@media(max-width:680px){.app{flex-direction:column}.sidebar{width:100%;min-width:0;height:auto;flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid #2A2F3E}.brand{display:none}.nav{display:flex;flex-direction:row;padding:0}.ni{flex-direction:column;gap:2px;padding:8px 10px;font-size:10px;border-left:none;border-bottom:3px solid transparent;white-space:nowrap}.ni.on{border-left:none;border-bottom-color:#FF6B35}.grid4{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const TYPES=[
{id:"crack",label:"Fisură",icon:"⚠️",color:"#FF6B35"},
{id:"flood",label:"Inundație",icon:"💧",color:"#4FC3F7"},
{id:"light",label:"Iluminat",icon:"💡",color:"#FFD54F"},
{id:"tree",label:"Copac",icon:"🌳",color:"#66BB6A"},
{id:"sign",label:"Indicator",icon:"🚧",color:"#EF5350"},
{id:"sidewalk",label:"Trotuar",icon:"🧱",color:"#AB47BC"},
{id:"graffiti",label:"Graffiti",icon:"🖌️",color:"#EC407A"},
{id:"waste",label:"Deșeuri",icon:"🗑️",color:"#8D6E63"},
];
const ADMIN_PW="Arad2026Admin!";
const LAT=46.1865,LNG=21.3123;
let issues=[
{id:1,type:"crack",title:"Groapă adâncă pe Bd. Revoluției",desc:"Groapă periculoasă, adâncime 15cm.",lat:46.1872,lng:21.3145,votes:47,status:"active",date:"2026-03-10",comments:8},
{id:2,type:"light",title:"Stâlp iluminat nefuncțional",desc:"3 stâlpi fără lumină pe Calea Aurel Vlaicu.",lat:46.1855,lng:21.3098,votes:31,status:"active",date:"2026-03-15",comments:3},
{id:3,type:"flood",title:"Apă stagnantă după ploaie",desc:"Canal înfundat, inundație după ploaie.",lat:46.1890,lng:21.3165,votes:28,status:"active",date:"2026-03-18",comments:5},
{id:4,type:"sidewalk",title:"Trotuar complet distrus",desc:"Dale ridicate, periculos.",lat:46.1848,lng:21.3112,votes:22,status:"active",date:"2026-03-20",comments:2},
{id:5,type:"waste",title:"Gunoi ilegal depozitat",desc:"Deșeuri construcție abandonate.",lat:46.1878,lng:21.3089,votes:19,status:"active",date:"2026-03-22",comments:4},
{id:6,type:"crack",title:"Fisuri structurale pe pod",desc:"Fisuri pe podul peste Mureș.",lat:46.1830,lng:21.3200,votes:63,status:"resolved",date:"2026-02-15",resolvedDate:"2026-03-01",comments:12},
{id:7,type:"sign",title:"Indicator STOP lipsă",desc:"Indicator dispărut, intersecție periculoasă.",lat:46.1862,lng:21.3134,votes:41,status:"resolved",date:"2026-02-20",resolvedDate:"2026-03-10",comments:6},
];
let page="map",filter="all",selId=null,showForm=false,pendingPin=null,nearbyId=null,votedIds=[],adminAuthed=false,toast=null,toastTimer=null,rateTimer=null;
const RATE_MS=60000;
const getRateSecs=()=>{try{const l=localStorage.getItem("uf_last");if(!l)return 0;const d=Date.now()-+l;return d>=RATE_MS?0:Math.ceil((RATE_MS-d)/1000);}catch{return 0;}};
const stampRate=()=>{try{localStorage.setItem("uf_last",String(Date.now()));}catch{}};
function hav(a,b,c,d){const R=6371000,r=Math.PI/180,e=(c-a)*r,f=(d-b)*r,g=Math.sin(e/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(f/2)**2;return R*2*Math.atan2(Math.sqrt(g),Math.sqrt(1-g));}
function toXY(lat,lng){return{x:Math.max(2,Math.min(98,50+(lng-LNG)*560)),y:Math.max(2,Math.min(98,50-(lat-LAT)*800))};}
function showToast(msg,icon="✅"){if(toastTimer)clearTimeout(toastTimer);toast={msg,icon};render();toastTimer=setTimeout(()=>{toast=null;render();},3000);}
function exportCSV(){const h=["ID","Data","Categorie","Titlu","Descriere","Lat","Lng","Status","Voturi"],r=issues.map(i=>[i.id,i.date,TYPES.find(t=>t.id===i.type)?.label||i.type,i.title,i.desc||"",i.lat,i.lng,i.status==="resolved"?"Rezolvat":"Activ",i.votes]),csv="\uFEFF"+[h,...r].map(row=>row.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\n"),b=new Blob([csv],{type:"text/csv;charset=utf-8;"}),u=URL.createObjectURL(b),a=Object.assign(document.createElement("a"),{href:u,download:`UrbanFix_${new Date().toISOString().split("T")[0]}.csv`});a.click();URL.revokeObjectURL(u);}

function render(){
const rateSecs=getRateSecs();const rl=rateSecs>0;
const active=issues.filter(i=>i.status==='active');
const resolved=issues.filter(i=>i.status==='resolved');
const pages={map:"🗺️ Hartă — Arad",issues:"📋 Probleme Raportate",resolved:"✅ Probleme Rezolvate",reports:"📊 Rapoarte",admin:adminAuthed?"🛡️ Admin Dashboard":"🛡️ Admin Portal"};

let html=`<div class="app">
<div class="sidebar">
<div class="brand">Urban<span>Fix</span> <span style="font-size:10px;color:#555D75;font-family:monospace;font-weight:400">ARAD</span></div>
<div class="nav">
${[{id:"map",icon:"🗺️",label:"Hartă",badge:active.length},{id:"issues",icon:"📋",label:"Probleme"},{id:"resolved",icon:"✅",label:"Rezolvate",badge:resolved.length},{id:"reports",icon:"📊",label:"Rapoarte"},{id:"_sep"},{id:"admin",icon:"🛡️",label:"Admin",badge:active.length,adm:true}].map(n=>{
if(n.id==='_sep')return`<div style="height:1px;background:#2A2F3E;margin:8px 12px"></div>`;
return`<div class="ni${page===n.id?' on':''}${n.adm?' adm':''}" onclick="nav('${n.id}')">
<span style="font-size:16px;width:20px;text-align:center">${n.icon}</span><span>${n.label}</span>
${n.badge>0?`<span class="badge${n.adm?' pu':''}">${n.badge}</span>`:''}
</div>`;}).join('')}
</div>
<div style="padding:14px;border-top:1px solid #2A2F3E">
<div style="display:flex;align-items:center;gap:8px;background:#1A1E28;border:1px solid #2A2F3E;border-radius:6px;padding:8px 12px">
<div style="width:7px;height:7px;border-radius:50%;background:${page==='admin'&&adminAuthed?'#7C4DFF':rl?'#FF1744':'#00E676'};flex-shrink:0"></div>
<div style="font-size:11px;font-family:monospace;color:#555D75"><strong style="color:#00E5FF;display:block;font-size:12px">${rl?`Blocat ${rateSecs}s`:'Acces anonim'}</strong>${rl?'Așteptați':'1 raport / min / IP'}</div>
</div></div>
</div>
<div class="main">
<div class="topbar">
<div class="topbar-title">${pages[page]}</div>
${rl&&page!=='admin'?`<div style="font-size:12px;font-family:monospace;color:#FF1744;background:rgba(255,23,68,.1);border:1px solid rgba(255,23,68,.3);border-radius:6px;padding:4px 10px">⏱️ ${rateSecs}s</div>`:''}
${page!=='admin'?`<button class="btn btn-primary" ${rl?'disabled':''} onclick="clickReport()">＋ Raportează</button>`:''}
${page==='admin'&&adminAuthed?`<button class="btn btn-ghost" style="font-size:11px" onclick="exportCSV()">📥 Excel</button>`:''}
</div>`;

if(page==='admin'){
if(!adminAuthed){
html+=`<div class="adm-gate"><div class="adm-card">
<div style="text-align:center;margin-bottom:24px"><div style="font-size:40px;margin-bottom:8px">🛡️</div><div style="font-size:22px;font-weight:800;color:#7C4DFF">Admin Portal</div><div style="font-size:11px;color:#555D75;font-family:monospace;margin-top:4px">UrbanFix Arad · Acces restricționat</div></div>
<div class="fg"><label class="fl">Parolă admin</label><input class="fi" id="adm-pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" style="border-color:#7C4DFF"/></div>
<button class="btn btn-pu" style="width:100%;padding:11px;font-size:14px" onclick="doLogin()">🔓 Intră în Admin</button>
<div style="font-size:10px;color:#555D75;font-family:monospace;text-align:center;margin-top:14px">Parola: <code>Arad2026Admin!</code></div>
</div></div>`;
}else{
const fi=issues.filter(i=>filter==='all'||i.status===filter).sort((a,b)=>b.votes-a.votes);
html+=`<div class="page">
<div style="background:linear-gradient(135deg,rgba(124,77,255,.18),rgba(0,229,255,.08));border:1px solid rgba(124,77,255,.3);border-radius:10px;padding:20px;margin-bottom:20px;display:flex;align-items:center;gap:16px">
<div style="flex:1"><div style="display:flex;align-items:center;gap:10px;margin-bottom:4px"><div style="font-size:22px;font-weight:800;color:#E8EAF0">🛡️ Admin Dashboard</div><span style="background:#7C4DFF;color:#fff;font-size:10px;font-family:monospace;padding:3px 10px;border-radius:20px;font-weight:700">ADMIN</span></div>
<div style="font-size:12px;color:#555D75;font-family:monospace">${new Date().toLocaleDateString('ro-RO')} · UrbanFix Arad</div></div>
<div style="display:flex;gap:8px"><button class="btn btn-ghost" style="font-size:11px" onclick="adminAuthed=false;render()">🚪 Ieși</button></div>
</div>
<div class="grid4">
${[[active.length,'#FF1744','Active'],[resolved.length,'#00E676','Rezolvate'],[issues.reduce((a,i)=>a+i.votes,0),'#00E5FF','Voturi'],[Math.round(resolved.length/Math.max(issues.length,1)*100)+'%','#7C4DFF','Rezolvare']].map(([v,c,l])=>`<div class="stat"><div class="stat-val" style="color:${c}">${v}</div><div class="stat-lbl">${l}</div></div>`).join('')}
</div>
<div style="display:flex;gap:6px;margin-bottom:16px">
${[["all","Toate"],["active","🔴 Active"],["resolved","✅ Rezolvate"]].map(([v,l])=>`<button class="btn ${filter===v?'btn-primary':'btn-ghost'}" style="font-size:11px;padding:5px 10px" onclick="filter='${v}';render()">${l}</button>`).join('')}
</div>
<div style="background:#12151C;border:1px solid #2A2F3E;border-radius:10px;overflow:hidden;overflow-x:auto">
<table class="tbl"><thead><tr>${['Categorie','Titlu','Data','Status','Voturi','Acțiuni'].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
<tbody>${fi.map(issue=>{const t=TYPES.find(x=>x.id===issue.type)||TYPES[0];return`<tr>
<td><span class="itag" style="background:${t.color}22;color:${t.color}">${t.icon} ${t.label}</span></td>
<td><div style="font-weight:700">${issue.title}</div><div style="font-size:11px;color:#8B92A8">${(issue.desc||'').slice(0,50)}</div></td>
<td style="font-family:monospace;font-size:11px">${issue.date}</td>
<td><span class="sbadge ${issue.status==='resolved'?'res':'act'}">${issue.status==='resolved'?'✅':'🔴'}</span></td>
<td style="font-family:monospace;font-weight:700;color:#FF6B35">${issue.votes}▲</td>
<td><div style="display:flex;gap:6px">
${issue.status==='active'?`<button class="btn btn-green" style="padding:5px 10px;font-size:11px" onclick="resolveIssue(${issue.id})">✅</button>`:''}
<button class="btn btn-red" style="padding:5px 10px;font-size:11px" onclick="deleteIssue(${issue.id})">🗑️</button>
</div></td>
</tr>`;}).join('')}</tbody></table></div></div>`;
}
}

else if(page==='map'){
html+=`<div class="page">
${rl?`<div class="rate-banner"><span style="font-size:22px">⏱️</span><div style="flex:1"><strong style="display:block;font-size:13px;color:#FF1744;margin-bottom:2px">Limită atinsă</strong><span style="font-size:12px;color:#8B92A8;font-family:monospace">Te rugăm să aștepți un minut.</span></div><div style="font-size:24px;font-weight:800;font-family:monospace;color:#FF1744">${rateSecs}s</div></div>`:''}
<div class="grid4">

${['＋','－','◎'].map(c=>`<div style="width:32px;height:32px;background:#12151C;border:1px solid #2A2F3E;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#8B92A8">${c}</div>`).join('')}
</div>
<div style="position:absolute;bottom:12px;left:12px;background:rgba(10,12,16,.85);border:1px solid #2A2F3E;border-radius:6px;padding:6px 10px;font-size:11px;font-family:monospace;color:#8B92A8">ARAD · <span style="color:#00E5FF">46.1865°N 21.3123°E</span>${!rl?' · Click pt. a raporta':''}</div>

${[...active].sort((a,b)=>b.votes-a.votes).slice(0,3).map(issue=>issueCard(issue,votedIds)).join('')}
</div>`;
}

else if(page==='issues'||page==='resolved'){
const list=(page==='resolved'?resolved:active).filter(i=>filter==='all'||i.type===filter).sort((a,b)=>b.votes-a.votes);
html+=`<div class="page">
<div class="chips">
<div class="chip${filter==='all'?' on':''}" onclick="filter='all';render()">Toate</div>
${TYPES.map(t=>`<div class="chip${filter===t.id?' on':''}" onclick="filter='${t.id}';render()">${t.icon} ${t.label}</div>`).join('')}

<div class="section-hdr"><div class="section-title">${page==='resolved'?`✅ ${resolved.length} rezolvate`:`🔴 ${list.length} active`}</div></div>
${list.length===0?'<div style="text-align:center;padding:40px;color:#555D75"><div style="font-size:40px;margin-bottom:8px">🎉</div><div>Nu există probleme</div></div>':list.map(issue=>issueCard(issue,votedIds)).join('')}
</div>`;

else if(page==='reports'){
const byType=TYPES.map(t=>({...t,count:issues.filter(i=>i.type===t.id).length})).filter(t=>t.count>0).sort((a,b)=>b.count-a.count);
const maxC=Math.max(...byType.map(t=>t.count),1);
html+=`<div class="page">
<div style="background:linear-gradient(135deg,rgba(124,77,255,.15),rgba(0,229,255,.08));border:1px solid #2A2F3E;border-radius:10px;padding:20px;margin-bottom:20px">

<div style="font-size:12px;color:#555D75;font-family:monospace">Generat automat · Arad, România</div></div>
<div class="grid4">
${[[active.length,'#FF6B35','Active'],[resolved.length,'#00E676','Rezolvate'],[issues.reduce((a,i)=>a+i.votes,0),'#00E5FF','Voturi'],['1/min','#FFD600','Rate limit']].map(([v,c,l])=>`<div class="stat"><div class="stat-val" style="color:${c};font-size:${typeof v==='string'?16:28}px">${v}</div><div class="stat-lbl">${l}</div></div>`).join('')}
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
<div style="background:#12151C;border:1px solid #2A2F3E;border-radius:10px;padding:16px">

${byType.map(t=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
<div style="font-size:11px;font-family:monospace;color:#8B92A8;width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.icon} ${t.label}</div>
<div style="flex:1;height:8px;background:#222736;border-radius:4px;overflow:hidden"><div style="height:100%;border-radius:4px;background:${t.color};width:${(t.count/maxC)*100}%"></div></div>
<div style="font-size:11px;font-family:monospace;color:#8B92A8;width:20px;text-align:right">${t.count}</div></div>`).join('')}
</div>
<div style="background:#12151C;border:1px solid #2A2F3E;border-radius:10px;padding:16px">
<div style="font-size:11px;color:#555D75;font-family:monospace;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px">Recomandări AI</div>
${[["⚠️","Bd. Revoluției — inspecție urgentă."],["🔓","Sistem anonim funcționează corect."],["✅","Rata rezolvare bună."]].map((r,i)=>`<div style="display:flex;gap:10px;padding:10px 0;border-bottom:${i<2?'1px solid #2A2F3E':'none'}"><span style="font-size:20px">${r[0]}</span><div style="font-size:12px;color:#8B92A8;line-height:1.5">${r[1]}</div></div>`).join('')}
</div></div></div>`;
}

html+=`</div></div>`;

if(showForm&&pendingPin){
const near=issues.find(i=>i.id===nearbyId);
html+=`<div class="overlay" onclick="closeForm()"><div class="dialog" onclick="event.stopPropagation()">
<div class="dialog-hdr"><div class="dialog-title">🚨 Raportează problemă</div><div class="dialog-close" onclick="closeForm()">✕</div></div>
<div class="dialog-body">
${near?`<div style="background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.35);border-radius:10px;padding:14px 16px;margin-bottom:16px">
<div style="font-size:13px;font-weight:700;color:#00E5FF;margin-bottom:6px">⚠️ Există deja un raport în această zonă (20m)</div>
<div style="display:flex;align-items:center;gap:10px;background:#1A1E28;border-radius:6px;padding:10px 12px">
<span class="itag" style="background:${(TYPES.find(t=>t.id===near.type)||TYPES[0]).color}22;color:${(TYPES.find(t=>t.id===near.type)||TYPES[0]).color}">${(TYPES.find(t=>t.id===near.type)||TYPES[0]).icon} ${(TYPES.find(t=>t.id===near.type)||TYPES[0]).label}</span>
<div style="flex:1;font-size:13px;font-weight:700;color:#E8EAF0">${near.title}</div>
<button class="btn btn-green" style="font-size:11px;padding:5px 10px" onclick="voteIssue(${near.id});closeForm()">▲ Votează</button>
</div></div>`:''}
${rl?`<div class="rate-banner" style="margin-bottom:16px"><span style="font-size:22px">⏱️</span><div style="flex:1"><strong style="display:block;font-size:13px;color:#FF1744">Așteptați</strong><span style="font-size:12px;color:#8B92A8;font-family:monospace">1 raport / min / IP</span></div><div style="font-size:24px;font-weight:800;font-family:monospace;color:#FF1744">${rateSecs}s</div></div>`:''}
<div class="coord-box"><div style="width:6px;height:6px;border-radius:50%;background:#00E5FF"></div>Pin: ${pendingPin.lat.toFixed(5)}°N, ${pendingPin.lng.toFixed(5)}°E</div>
<div class="fg"><label class="fl">Tip problemă</label><div class="type-grid">
${TYPES.map(t=>`<div class="type-opt${t.id===window._formType?' on':''}" style="${t.id===window._formType?`color:${t.color};border-color:${t.color}`:''}" onclick="window._formType='${t.id}';render()"><span style="font-size:18px">${t.icon}</span><span style="font-size:11px">${t.label}</span></div>`).join('')}
</div></div>
<div class="fg"><label class="fl">Titlu *</label><input class="fi" id="f-title" placeholder="ex: Groapă adâncă pe Bd. Revoluției" maxlength="100" value="${(window._formTitle||'').replace(/"/g,'&quot;')}"/></div>
<div class="fg"><label class="fl">Descriere</label><textarea class="fi ftxt" id="f-desc" placeholder="Descrie problema...">${window._formDesc||''}</textarea></div>
<div class="note">🔒 Nu este necesar un cont. IP-ul este stocat intern doar pentru moderare.</div>
<button class="btn btn-primary" style="width:100%;padding:12px;font-size:14px" ${rl?'disabled':''} onclick="submitForm()">${rl?`⏱️ Așteptați ${rateSecs}s...`:'📤 Trimite raportul'}</button>
</div></div></div>`;
}

const sel=issues.find(i=>i.id===selId);
if(sel){

<div class="dialog-hdr"><div class="dialog-title" style="font-size:15px">${sel.title}</div><div class="dialog-close" onclick="selId=null;render()">✕</div></div>
<div class="dialog-body">

function issueCard(issue,votedIds){
const t=TYPES.find(x=>x.id===issue.type)||TYPES[0];
const voted=votedIds.includes(issue.id);
return`<div class="icard${selId===issue.id?' sel':''}" onclick="selId=${issue.id};render()">
<div class="vote-col">
<div class="vote-btn${voted?' voted':''}" onclick="event.stopPropagation();voteIssue(${issue.id})">▲</div>
<div class="vote-count">${issue.votes}</div>
<div class="vote-lbl">voturi</div>
</div>
<div class="ibody">
<span class="itag" style="background:${t.color}22;color:${t.color}">${t.icon} ${t.label}</span>
${issue.status==='resolved'?`<span class="sbadge res" style="margin-left:6px">✅ Rezolvat</span>`:''}
<div class="ititle">${issue.title}</div>
<div class="idesc">${issue.desc}</div>
<div class="imeta"><span>📅 ${issue.date}</span><span style="color:#2A2F3E">·</span><span>💬 ${issue.comments||0}</span>${issue.resolvedDate?`<span style="color:#2A2F3E">·</span><span style="color:#00E676">✅ ${issue.resolvedDate}</span>`:''}</div>
</div></div>`;
}

function nav(p){page=p;filter='all';selId=null;render();}
function clickReport(){if(getRateSecs()>0){showToast("Te rugăm să aștepți un minut.","⏱️");return;}page='map';render();showToast("Click pe hartă pentru a plasa un pin!","📍");}
function mapClick(e){
if(getRateSecs()>0)return;
const c=document.getElementById('mapcanvas');if(!c)return;
const r=c.getBoundingClientRect();
const px=((e.clientX-r.left)/r.width)*100;
const py=((e.clientY-r.top)/r.height)*100;
const lat=LAT+(50-py)/800;const lng=LNG+(px-50)/560;
const near=issues.find(i=>i.status==='active'&&hav(lat,lng,i.lat,i.lng)<=20);
nearbyId=near?near.id:null;
pendingPin={lat,lng,px,py};
window._formType='crack';window._formTitle='';window._formDesc='';
showForm=true;render();
}
function closeForm(){showForm=false;pendingPin=null;nearbyId=null;render();}
function submitForm(){
if(getRateSecs()>0)return;
const title=document.getElementById('f-title')?.value?.trim();
const desc=document.getElementById('f-desc')?.value?.trim();
if(!title)return;
issues=[{id:Date.now(),type:window._formType||'crack',title,desc,lat:pendingPin.lat,lng:pendingPin.lng,votes:0,status:'active',date:new Date().toISOString().split('T')[0],comments:0},...issues];
closeForm();stampRate();showToast("Problemă raportată!","🚨");
}
function voteIssue(id){
const a=votedIds.includes(id);
votedIds=a?votedIds.filter(v=>v!==id):[...votedIds,id];
issues=issues.map(i=>i.id===id?{...i,votes:i.votes+(a?-1:1)}:i);
if(!a)showToast("Vot înregistrat!","▲");
render();
}
function resolveIssue(id){
issues=issues.map(i=>i.id===id?{...i,status:'resolved',resolvedDate:new Date().toISOString().split('T')[0]}:i);
selId=null;showToast("Rezolvat!","✅");render();
}
function deleteIssue(id){
issues=issues.filter(i=>i.id!==id);
showToast("Șters.","🗑️");render();
}
function doLogin(){
const pw=document.getElementById('adm-pw')?.value;
if(pw===ADMIN_PW){adminAuthed=true;render();}
else{document.querySelector('.adm-err')||document.querySelector('.adm-card').insertAdjacentHTML('afterbegin','<div class="adm-err">❌ Parolă incorectă.</div>');};
}
window._formType='crack';window._formTitle='';window._formDesc='';
render();
</script>
