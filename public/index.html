<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UrbanFix Arad</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0C10;color:#E8EAF0;font-family:sans-serif;min-height:100vh}
.app{display:flex;height:100vh}
.sidebar{width:220px;background:#12151C;border-right:1px solid #2A2F3E;padding:20px 0;display:flex;flex-direction:column}
.brand{padding:0 20px 20px;font-size:18px;font-weight:800;border-bottom:1px solid #2A2F3E;margin-bottom:10px}
.brand b{color:#FF6B35}
.ni{padding:10px 20px;cursor:pointer;color:#8B92A8;font-size:13px;border-left:3px solid transparent}
.ni:hover{color:#E8EAF0;background:#1A1E28}
.ni.on{color:#FF6B35;border-left-color:#FF6B35;background:rgba(255,107,53,.08)}
.main{flex:1;display:flex;flex-direction:column}
.topbar{height:52px;background:#12151C;border-bottom:1px solid #2A2F3E;display:flex;align-items:center;padding:0 20px;gap:10px}
.topbar h2{flex:1;font-size:14px}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:700}
.btn-p{background:#FF6B35;color:#fff}
.btn-g{background:#1A1E28;color:#8B92A8;border:1px solid #2A2F3E}
.btn-gr{background:rgba(0,230,118,.12);color:#00E676;border:1px solid rgba(0,230,118,.3)}
.btn-rd{background:rgba(255,23,68,.12);color:#FF1744;border:1px solid rgba(255,23,68,.3)}
.page{flex:1;overflow-y:auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.card{background:#12151C;border:1px solid #2A2F3E;border-radius:10px;padding:16px}
.card .val{font-size:28px;font-weight:800}
.card .lbl{font-size:11px;color:#555D75;margin-top:4px;text-transform:uppercase}
.map{background:#1A1E28;border:1px solid #2A2F3E;border-radius:10px;height:320px;position:relative;overflow:hidden;cursor:crosshair;margin-bottom:20px}
.pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;font-size:20px}
.icard{background:#12151C;border:1px solid #2A2F3E;border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;gap:12px}
.icard:hover{border-color:#FF6B35;background:rgba(255,107,53,.04)}
.votes{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:40px}
.vbtn{width:28px;height:28px;border-radius:50%;background:#1A1E28;border:1px solid #2A2F3E;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.vbtn.on{background:#FF6B35;border-color:#FF6B35}
.vnum{font-size:16px;font-weight:800;color:#E8EAF0}
.ibody{flex:1}
.ititle{font-size:14px;font-weight:700;margin-bottom:4px;color:#E8EAF0}
.idesc{font-size:12px;color:#8B92A8;margin-bottom:6px}
.imeta{font-size:11px;color:#555D75}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin-right:4px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.dialog{background:#12151C;border:1px solid #2A2F3E;border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:24px}
.dialog h3{font-size:18px;margin-bottom:20px;color:#E8EAF0}
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;color:#555D75;margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px}
.fi{width:100%;background:#1A1E28;border:1px solid #2A2F3E;border-radius:6px;padding:10px;color:#E8EAF0;font-size:13px;outline:none}
.fi:focus{border-color:#FF6B35}
.tgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.topt{padding:10px;border:1px solid #2A2F3E;border-radius:6px;cursor:pointer;font-size:12px;background:#1A1E28;color:#E8EAF0;display:flex;align-items:center;gap:6px}
.topt.on{border-color:#FF6B35;color:#FF6B35}
.toast{position:fixed;bottom:20px;right:20px;background:#12151C;border:1px solid #2A2F3E;border-radius:10px;padding:12px 16px;color:#E8EAF0;font-size:13px;z-index:999;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const T=[{id:"crack",l:"Fisură",e:"⚠️",c:"#FF6B35"},{id:"flood",l:"Inundație",e:"💧",c:"#4FC3F7"},{id:"light",l:"Iluminat",e:"💡",c:"#FFD54F"},{id:"tree",l:"Copac",e:"🌳",c:"#66BB6A"},{id:"sign",l:"Indicator",e:"🚧",c:"#EF5350"},{id:"sidewalk",l:"Trotuar",e:"🧱",c:"#AB47BC"},{id:"graffiti",l:"Graffiti",e:"🖌️",c:"#EC407A"},{id:"waste",l:"Deșeuri",e:"🗑️",c:"#8D6E63"}];
let issues=[
{id:1,type:"crack",title:"Groapă pe Bd. Revoluției",desc:"Groapă periculoasă, 15cm adâncime.",lat:46.1872,lng:21.3145,votes:47,status:"active",date:"2026-03-10"},
{id:2,type:"light",title:"Stâlp nefuncțional",desc:"3 stâlpi fără lumină pe Calea Aurel Vlaicu.",lat:46.1855,lng:21.3098,votes:31,status:"active",date:"2026-03-15"},
{id:3,type:"flood",title:"Apă stagnantă",desc:"Canal înfundat, inundație după ploaie.",lat:46.1890,lng:21.3165,votes:28,status:"active",date:"2026-03-18"},
{id:4,type:"sidewalk",title:"Trotuar distrus",desc:"Dale ridicate, periculos.",lat:46.1848,lng:21.3112,votes:22,status:"active",date:"2026-03-20"},
{id:5,type:"waste",title:"Gunoi ilegal",desc:"Deșeuri construcție abandonate.",lat:46.1878,lng:21.3089,votes:19,status:"active",date:"2026-03-22"},
{id:6,type:"crack",title:"Fisuri pe pod",desc:"Fisuri pe podul peste Mureș.",lat:46.1830,lng:21.3200,votes:63,status:"resolved",date:"2026-02-15"},
{id:7,type:"sign",title:"Indicator STOP lipsă",desc:"Intersecție periculoasă.",lat:46.1862,lng:21.3134,votes:41,status:"resolved",date:"2026-02-20"},
];
let pg="map",sel=null,voted=[],form=false,pin=null,toast=null,admOk=false;
const LAT=46.1865,LNG=21.3123;
function hav(a,b,c,d){const R=6371000,r=Math.PI/180,e=(c-a)*r,f=(d-b)*r,g=Math.sin(e/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(f/2)**2;return R*2*Math.atan2(Math.sqrt(g),Math.sqrt(1-g));}
function xy(lat,lng){return{x:Math.max(2,Math.min(98,50+(lng-LNG)*560)),y:Math.max(2,Math.min(98,50-(lat-LAT)*800))};}
function showToast(m,i="✅"){toast={m,i};render();setTimeout(()=>{toast=null;render();},3000);}
function render(){
const active=issues.filter(i=>i.status==="active");
const resolved=issues.filter(i=>i.status==="resolved");
const pages={map:"🗺️ Hartă — Arad",issues:"📋 Probleme",resolved:"✅ Rezolvate",admin:admOk?"🛡️ Admin":"🛡️ Login Admin"};
let h=`<div class="app">
<div class="sidebar">
<div class="brand">Urban<b>Fix</b> Arad</div>
${[{id:"map",icon:"🗺️",label:"Hartă",n:active.length},{id:"issues",icon:"📋",label:"Probleme"},{id:"resolved",icon:"✅",label:"Rezolvate",n:resolved.length},{id:"admin",icon:"🛡️",label:"Admin"}].map(n=>`
<div class="ni${pg===n.id?" on":""}" onclick="pg='${n.id}';sel=null;render()">${n.icon} ${n.label}${n.n>0?` <span style="margin-left:auto;background:#FF6B35;color:#fff;font-size:10px;padding:1px 6px;border-radius:10px">${n.n}</span>`:""}</div>`).join("")}
</div>
<div class="main">
<div class="topbar"><h2>${pages[pg]}</h2>
${pg!=="admin"?`<button class="btn btn-p" onclick="pg='map';render();showToast('Click pe hartă!','📍')">＋ Raportează</button>`:""}
</div>`;

if(pg==="map"){
h+=`<div class="page">
<div class="grid">
<div class="card"><div class="val" style="color:#FF6B35">${active.length}</div><div class="lbl">Active</div></div>
<div class="card"><div class="val" style="color:#00E676">${resolved.length}</div><div class="lbl">Rezolvate</div></div>
<div class="card"><div class="val" style="color:#00E5FF">${issues.reduce((a,i)=>a+i.votes,0)}</div><div class="lbl">Voturi</div></div>
<div class="card"><div class="val" style="color:#7C4DFF;font-size:18px">LIVE</div><div class="lbl">Status</div></div>
</div>
<div class="map" id="mapel" onclick="mapClick(event)">
${issues.map(i=>{const p=xy(i.lat,i.lng),t=T.find(x=>x.id===i.type)||T[0];return`<div class="pin" style="left:${p.x}%;top:${p.y}%" onclick="event.stopPropagation();sel=${i.id};render()" title="${i.title}">${t.e}</div>`;}).join("")}
${pin?`<div style="position:absolute;left:${pin.px}%;top:${pin.py}%;transform:translate(-50%,-50%);width:12px;height:12px;background:#FF6B35;border-radius:50%;border:2px solid #fff;z-index:5"></div>`:""}
<div style="position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.7);padding:5px 10px;border-radius:6px;font-size:11px;color:#8B92A8">Click pe hartă pentru a raporta o problemă</div>
</div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><strong>Cele mai votate</strong><button class="btn btn-g" onclick="pg='issues';render()">Vezi toate →</button></div>
${[...active].sort((a,b)=>b.votes-a.votes).slice(0,3).map(i=>icard(i)).join("")}
</div>`;
}

else if(pg==="issues"||pg==="resolved"){
const list=(pg==="resolved"?resolved:active).sort((a,b)=>b.votes-a.votes);
h+=`<div class="page">${list.length===0?`<div style="text-align:center;padding:40px;color:#555D75">🎉 Nu există probleme</div>`:list.map(i=>icard(i)).join("")}</div>`;
}

else if(pg==="admin"){
if(!admOk){
h+=`<div class="page"><div style="max-width:380px;margin:40px auto;background:#12151C;border:1px solid #7C4DFF;border-radius:16px;padding:36px">
<div style="text-align:center;margin-bottom:24px"><div style="font-size:40px">🛡️</div><div style="font-size:20px;font-weight:800;color:#7C4DFF;margin-top:8px">Admin Portal</div></div>
<div class="fg"><label class="fl">Parolă</label><input class="fi" id="apw" type="password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
<button class="btn btn-p" style="width:100%;padding:11px;background:#7C4DFF" onclick="doLogin()">🔓 Intră</button>
<div style="text-align:center;margin-top:12px;font-size:11px;color:#555D75">Parola: Arad2026Admin!</div>
</div></div>`;
}else{
h+=`<div class="page">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
<div style="font-size:20px;font-weight:800">🛡️ Admin Dashboard</div>
<button class="btn btn-g" onclick="admOk=false;render()">🚪 Ieși</button>
</div>
<div class="grid">
<div class="card"><div class="val" style="color:#FF1744">${active.length}</div><div class="lbl">Active</div></div>
<div class="card"><div class="val" style="color:#00E676">${resolved.length}</div><div class="lbl">Rezolvate</div></div>
<div class="card"><div class="val" style="color:#00E5FF">${issues.reduce((a,i)=>a+i.votes,0)}</div><div class="lbl">Voturi</div></div>
<div class="card"><div class="val" style="color:#7C4DFF">${Math.round(resolved.length/Math.max(issues.length,1)*100)}%</div><div class="lbl">Rezolvare</div></div>
</div>
<div style="background:#12151C;border:1px solid #2A2F3E;border-radius:10px;overflow:hidden;overflow-x:auto">
<table style="width:100%;border-collapse:collapse">
<thead><tr>${["Tip","Titlu","Data","Status","Voturi","Acțiuni"].map(h=>`<th style="background:#1A1E28;padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;color:#555D75;text-align:left;border-bottom:1px solid #2A2F3E">${h}</th>`).join("")}</tr></thead>
<tbody>${issues.map(i=>{const t=T.find(x=>x.id===i.type)||T[0];return`<tr>
<td style="padding:12px 14px;border-bottom:1px solid #2A2F3E"><span class="tag" style="background:${t.c}22;color:${t.c}">${t.e} ${t.l}</span></td>
<td style="padding:12px 14px;border-bottom:1px solid #2A2F3E;font-weight:700;color:#E8EAF0">${i.title}</td>
<td style="padding:12px 14px;border-bottom:1px solid #2A2F3E;font-size:11px;color:#8B92A8">${i.date}</td>
<td style="padding:12px 14px;border-bottom:1px solid #2A2F3E"><span class="tag" style="background:${i.status==="resolved"?"rgba(0,230,118,.15)":"rgba(255,107,53,.15)"};color:${i.status==="resolved"?"#00E676":"#FF6B35"}">${i.status==="resolved"?"✅ Rezolvat":"🔴 Activ"}</span></td>
<td style="padding:12px 14px;border-bottom:1px solid #2A2F3E;font-weight:700;color:#FF6B35">${i.votes}▲</td>
<td style="padding:12px 14px;border-bottom:1px solid #2A2F3E"><div style="display:flex;gap:6px">
${i.status==="active"?`<button class="btn btn-gr" style="padding:5px 10px;font-size:11px" onclick="resolve(${i.id})">✅</button>`:""}
<button class="btn btn-rd" style="padding:5px 10px;font-size:11px" onclick="del(${i.id})">🗑️</button>
</div></td>
</tr>`;}).join("")}</tbody>
</table></div></div>`;
}
}

h+=`</div></div>`;

if(form&&pin){
const near=issues.find(i=>i.status==="active"&&hav(pin.lat,pin.lng,i.lat,i.lng)<=20);
h+=`<div class="overlay" onclick="form=false;pin=null;render()"><div class="dialog" onclick="event.stopPropagation()">
<h3>🚨 Raportează problemă</h3>
${near?`<div style="background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.3);border-radius:8px;padding:12px;margin-bottom:16px"><div style="color:#00E5FF;font-weight:700;margin-bottom:8px">⚠️ Există deja un raport în această zonă!</div>
<button class="btn btn-gr" onclick="doVote(${near.id});form=false;pin=null;render()">▲ Votează raportul existent</button></div>`:""}
<div style="background:#1A1E28;border-radius:6px;padding:8px 12px;font-size:11px;color:#00E5FF;margin-bottom:16px">📍 ${pin.lat.toFixed(5)}°N, ${pin.lng.toFixed(5)}°E</div>
<div class="fg"><label class="fl">Tip problemă</label><div class="tgrid">
${T.map(t=>`<div class="topt${window._ft===t.id?" on":""}" onclick="window._ft='${t.id}';render()" style="${window._ft===t.id?`border-color:${t.c};color:${t.c}`:""}"><span style="font-size:18px">${t.e}</span>${t.l}</div>`).join("")}
</div></div>
<div class="fg"><label class="fl">Titlu *</label><input class="fi" id="ft" placeholder="Descrie pe scurt problema..." maxlength="100"/></div>
<div class="fg"><label class="fl">Descriere</label><textarea class="fi" id="fd" rows="3" placeholder="Detalii suplimentare..."></textarea></div>
<div style="display:flex;gap:10px;margin-top:4px">
<button class="btn btn-g" style="flex:1" onclick="form=false;pin=null;render()">Anulează</button>
<button class="btn btn-p" style="flex:1" onclick="submitForm()">📤 Trimite</button>
</div>
</div></div>`;
}

if(sel!==null){
const i=issues.find(x=>x.id===sel);
if(i){const t=T.find(x=>x.id===i.type)||T[0];const v=voted.includes(i.id);
h+=`<div class="overlay" onclick="sel=null;render()"><div class="dialog" onclick="event.stopPropagation()">
<h3>${i.title}</h3>
<div style="margin-bottom:12px"><span class="tag" style="background:${t.c}22;color:${t.c}">${t.e} ${t.l}</span><span class="tag" style="background:${i.status==="resolved"?"rgba(0,230,118,.15)":"rgba(255,107,53,.15)"};color:${i.status==="resolved"?"#00E676":"#FF6B35"}">${i.status==="resolved"?"✅ Rezolvat":"🔴 Activ"}</span></div>
<p style="font-size:13px;color:#8B92A8;line-height:1.6;margin-bottom:16px">${i.desc}</p>
<div style="font-size:11px;color:#555D75;margin-bottom:16px">📅 ${i.date} · 📍 ${i.lat.toFixed(4)}°N ${i.lng.toFixed(4)}°E</div>
<div style="display:flex;gap:8px;margin-bottom:12px">
<button class="btn ${v?"btn-p":"btn-g"}" style="flex:1" onclick="doVote(${i.id})">${v?"▲ Votat":"▲ Votează"} · ${i.votes}</button>
${i.status==="active"?`<button class="btn btn-gr" style="flex:1" onclick="resolve(${i.id})">✅ Rezolvat</button>`:""}
</div>
<button class="btn btn-g" style="width:100%" onclick="sel=null;render()">Închide</button>
</div></div>`;
}
}

if(toast){h+=`<div class="toast"><span style="font-size:18px">${toast.i}</span>${toast.m}</div>`;}

document.getElementById("root").innerHTML=h;
}

function icard(i){const t=T.find(x=>x.id===i.type)||T[0];const v=voted.includes(i.id);return`<div class="icard" onclick="sel=${i.id};render()">
<div class="votes"><div class="vbtn${v?" on":""}" onclick="event.stopPropagation();doVote(${i.id})">▲</div><div class="vnum">${i.votes}</div><div style="font-size:9px;color:#555D75">voturi</div></div>
<div class="ibody"><span class="tag" style="background:${t.c}22;color:${t.c}">${t.e} ${t.l}</span><div class="ititle">${i.title}</div><div class="idesc">${i.desc}</div><div class="imeta">📅 ${i.date}</div></div></div>`;}
function mapClick(e){const m=document.getElementById("mapel");if(!m)return;const r=m.getBoundingClientRect();const px=((e.clientX-r.left)/r.width)*100;const py=((e.clientY-r.top)/r.height)*100;pin={lat:LAT+(50-py)/800,lng:LNG+(px-50)/560,px,py};window._ft="crack";form=true;render();}
function submitForm(){const title=document.getElementById("ft")?.value?.trim();const desc=document.getElementById("fd")?.value?.trim();if(!title)return;issues=[{id:Date.now(),type:window._ft||"crack",title,desc:desc||"",lat:pin.lat,lng:pin.lng,votes:0,status:"active",date:new Date().toISOString().split("T")[0]},...issues];form=false;pin=null;showToast("Problemă raportată! ","🚨");}
function doVote(id){const a=voted.includes(id);voted=a?voted.filter(v=>v!==id):[...voted,id];issues=issues.map(i=>i.id===id?{...i,votes:i.votes+(a?-1:1)}:i);if(!a)showToast("Vot înregistrat!","▲");else render();}
function resolve(id){issues=issues.map(i=>i.id===id?{...i,status:"resolved"}:i);sel=null;showToast("Rezolvat! ","✅");}
function del(id){issues=issues.filter(i=>i.id!==id);showToast("Șters.","🗑️");}
function doLogin(){const pw=document.getElementById("apw")?.value;if(pw==="Arad2026Admin!"){admOk=true;render();}else{alert("Parolă incorectă!");}}
window._ft="crack";
render();
</script>
</body>
</html>
