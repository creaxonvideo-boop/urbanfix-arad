<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UrbanFix Arad</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0C10;color:#E8EAF0;font-family:sans-serif}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;background:#12151C;border-right:1px solid #2A2F3E;display:flex;flex-direction:column;flex-shrink:0}
.brand{padding:16px 20px;border-bottom:1px solid #2A2F3E;font-size:18px;font-weight:800}
.brand span{color:#FF6B35}
.nav a{display:flex;align-items:center;gap:8px;padding:11px 20px;color:#8B92A8;font-size:13px;font-weight:600;cursor:pointer;border-left:3px solid transparent;text-decoration:none}
.nav a:hover{color:#E8EAF0;background:#1A1E28}
.nav a.on{color:#FF6B35;background:rgba(255,107,53,.08);border-left-color:#FF6B35}
.nav a.adm.on{color:#7C4DFF;background:rgba(124,77,255,.1);border-left-color:#7C4DFF}
.badge{margin-left:auto;background:#FF6B35;color:#fff;font-size:10px;padding:1px 6px;border-radius:10px}
.badge.pu{background:#7C4DFF}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.bar{height:52px;background:#12151C;border-bottom:1px solid #2A2F3E;display:flex;align-items:center;padding:0 20px;gap:10px}
.bar h2{flex:1;font-size:14px;font-weight:700}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
.p{background:#FF6B35;color:#fff}
.p:disabled{opacity:.4;cursor:not-allowed}
.g{background:#1A1E28;color:#8B92A8;border:1px solid #2A2F3E}
.gr{background:rgba(0,230,118,.12);color:#00E676;border:1px solid rgba(0,230,118,.3)}
.rd{background:rgba(255,23,68,.12);color:#FF1744;border:1px solid rgba(255,23,68,.3)}
.pu{background:#7C4DFF;color:#fff}
.page{flex:1;overflow-y:auto;padding:20px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sc{background:#12151C;border:1px solid #2A2F3E;border-radius:10px;padding:16px}
.sv{font-size:26px;font-weight:800}.sl{font-size:11px;color:#555D75;margin-top:4px;text-transform:uppercase}
.map{background:#1A1E28;border:1px solid #2A2F3E;border-radius:10px;height:300px;position:relative;overflow:hidden;margin-bottom:20px;cursor:crosshair}
.map svg{position:absolute;inset:0;width:100%;height:100%;opacity:.25}
.ml{position:absolute;font-size:10px;color:#4a5578;pointer-events:none}
.pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:2;font-size:20px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
.pin:hover{transform:translate(-50%,-100%) scale(1.2);z-index:3}
.pvote{position:absolute;top:-8px;right:-8px;background:#FF6B35;color:#fff;font-size:9px;padding:1px 4px;border-radius:8px;min-width:16px;text-align:center;font-weight:700}
.ic{background:#12151C;border:1px solid #2A2F3E;border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;gap:12px}
.ic:hover{border-color:#FF6B35;background:rgba(255,107,53,.04)}
.vc{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:38px}
.vb{width:28px;height:28px;border-radius:50%;background:#1A1E28;border:1px solid #2A2F3E;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.vb.on,.vb:hover{background:#FF6B35;border-color:#FF6B35;color:#fff}
.vn{font-size:16px;font-weight:800}.vl{font-size:9px;color:#555D75;text-transform:uppercase}
.ib{flex:1;min-width:0}
.it{font-size:14px;font-weight:700;margin:5px 0 3px;color:#E8EAF0}
.id{font-size:12px;color:#8B92A8;margin-bottom:6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.im{font-size:11px;color:#555D75}
.tg{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.sb{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.dl{background:#12151C;border:1px solid #2A2F3E;border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:24px}
.dl h3{font-size:17px;font-weight:800;margin-bottom:18px;color:#E8EAF0}
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;color:#555D75;margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px}
.fi{width:100%;background:#1A1E28;border:1px solid #2A2F3E;border-radius:6px;padding:10px;color:#E8EAF0;font-size:13px;outline:none;font-family:inherit}
.fi:focus{border-color:#FF6B35}
.tg2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.to{padding:9px;border:1px solid #2A2F3E;border-radius:6px;cursor:pointer;font-size:12px;background:#1A1E28;color:#E8EAF0;display:flex;align-items:center;gap:6px}
.to.on{border-color:#FF6B35;color:#FF6B35}
.note{font-size:11px;color:#555D75;margin-bottom:12px;line-height:1.6;background:#1A1E28;border-radius:6px;padding:8px 12px;border:1px solid #2A2F3E}
.toast{position:fixed;bottom:20px;right:20px;background:#12151C;border:1px solid #2A2F3E;border-radius:10px;padding:12px 16px;color:#E8EAF0;font-size:13px;z-index:999;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.sep{height:1px;background:#2A2F3E;margin:8px 12px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:#1A1E28;padding:10px 12px;font-size:11px;font-weight:700;text-transform:uppercase;color:#555D75;text-align:left;border-bottom:1px solid #2A2F3E}
.tbl td{padding:11px 12px;font-size:12px;border-bottom:1px solid #2A2F3E;color:#E8EAF0;vertical-align:middle}
.tbl tr:hover td{background:#1A1E28}
@media(max-width:600px){.app{flex-direction:column}.sidebar{width:100%;height:auto;flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid #2A2F3E}.brand{display:none}.nav{display:flex}.nav a{flex-direction:column;gap:2px;padding:8px 10px;font-size:10px;border-left:none;border-bottom:3px solid transparent;white-space:nowrap}.nav a.on{border-left:none;border-bottom-color:#FF6B35}.g4{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="R"></div>
<script>
const TY=[{id:"crack",l:"Fisură",e:"⚠️",c:"#FF6B35"},{id:"flood",l:"Inundație",e:"💧",c:"#4FC3F7"},{id:"light",l:"Iluminat",e:"💡",c:"#FFD54F"},{id:"tree",l:"Copac",e:"🌳",c:"#66BB6A"},{id:"sign",l:"Indicator",e:"🚧",c:"#EF5350"},{id:"sidewalk",l:"Trotuar",e:"🧱",c:"#AB47BC"},{id:"graffiti",l:"Graffiti",e:"🖌️",c:"#EC407A"},{id:"waste",l:"Deșeuri",e:"🗑️",c:"#8D6E63"}];
const APW="Arad2026Admin!";
const CX=46.1865,CY=21.3123;
let IS=[
{id:1,type:"crack",title:"Groapă pe Bd. Revoluției",desc:"Groapă periculoasă, 15cm adâncime.",lat:46.1872,lng:21.3145,votes:47,status:"active",date:"2026-03-10"},
{id:2,type:"light",title:"Stâlp nefuncțional",desc:"3 stâlpi fără lumină pe Calea Aurel Vlaicu.",lat:46.1855,lng:21.3098,votes:31,status:"active",date:"2026-03-15"},
{id:3,type:"flood",title:"Apă stagnantă",desc:"Canal înfundat, inundație după ploaie.",lat:46.1890,lng:21.3165,votes:28,status:"active",date:"2026-03-18"},
{id:4,type:"sidewalk",title:"Trotuar distrus",desc:"Dale ridicate, periculos.",lat:46.1848,lng:21.3112,votes:22,status:"active",date:"2026-03-20"},
{id:5,type:"waste",title:"Gunoi ilegal",desc:"Deșeuri construcție abandonate.",lat:46.1878,lng:21.3089,votes:19,status:"active",date:"2026-03-22"},
{id:6,type:"crack",title:"Fisuri pe pod",desc:"Fisuri pe podul peste Mureș.",lat:46.1830,lng:21.3200,votes:63,status:"resolved",date:"2026-02-15"},
{id:7,type:"sign",title:"Indicator STOP lipsă",desc:"Intersecție periculoasă.",lat:46.1862,lng:21.3134,votes:41,status:"resolved",date:"2026-02-20"},
];
let PG="map",SEL=null,VT=[],FRM=false,PIN=null,ADM=false,TST=null,FT="crack";
function hav(a,b,c,d){const R=6371000,r=Math.PI/180,e=(c-a)*r,f=(d-b)*r,g=Math.sin(e/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(f/2)**2;return R*2*Math.atan2(Math.sqrt(g),Math.sqrt(1-g));}
function xy(la,lo){return{x:Math.max(2,Math.min(98,50+(lo-CY)*560)),y:Math.max(2,Math.min(98,50-(la-CX)*800))};}
function toast(m,i="✅"){TST={m,i};R();setTimeout(()=>{TST=null;R();},3000);}
function R(){
const ac=IS.filter(i=>i.status==="active"),rs=IS.filter(i=>i.status==="resolved");
const titles={map:"🗺️ Hartă — Arad",issues:"📋 Probleme",resolved:"✅ Rezolvate",admin:ADM?"🛡️ Admin":"🛡️ Admin Portal"};
let h=`<div class="app"><div class="sidebar"><div class="brand">Urban<span>Fix</span> Arad</div><div class="nav">
<a class="${PG==="map"?"on":""}" onclick="nav('map')">🗺️ Hartă<span class="badge">${ac.length}</span></a>
<a class="${PG==="issues"?"on":""}" onclick="nav('issues')">📋 Probleme</a>
<a class="${PG==="resolved"?"on":""}" onclick="nav('resolved')">✅ Rezolvate<span class="badge">${rs.length}</span></a>
<div class="sep"></div>
<a class="adm ${PG==="admin"?"on":""}" onclick="nav('admin')">🛡️ Admin<span class="badge pu">${ac.length}</span></a>
</div></div>
<div class="main"><div class="bar"><h2>${titles[PG]}</h2>
${PG!=="admin"?`<button class="btn p" onclick="nav('map');toast('Click pe hartă!','📍')">＋ Raportează</button>`:""}
</div>`;
if(PG==="map"){
h+=`<div class="page"><div class="g4">
<div class="sc"><div class="sv" style="color:#FF6B35">${ac.length}</div><div class="sl">Active</div></div>
<div class="sc"><div class="sv" style="color:#00E676">${rs.length}</div><div class="sl">Rezolvate</div></div>
<div class="sc"><div class="sv" style="color:#00E5FF">${IS.reduce((a,i)=>a+i.votes,0)}</div><div class="sl">Voturi</div></div>
<div class="sc"><div class="sv" style="color:#00E676;font-size:18px">LIVE</div><div class="sl">Status</div></div>
</div>
<div class="map" id="MP" onclick="MC(event)">
<svg viewBox="0 0 960 360" preserveAspectRatio="none">
${[[0,85,960,6],[0,145,960,10],[0,205,960,6],[0,260,960,8]].map(([x,y,w,h])=>`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="#3a4560"/>`).join("")}
${[[120,0,6,360],[240,0,10,360],[380,0,6,360],[480,0,12,360],[600,0,6,360],[720,0,8,360]].map(([x,y,w,h])=>`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="#4a5570"/>`).join("")}
<ellipse cx="480" cy="338" rx="500" ry="25" fill="#1a2840" opacity=".9"/>
</svg>
<div class="ml" style="top:32%;left:4%">Bd. Revoluției</div>
<div class="ml" style="top:52%;left:22%">Calea Aurel Vlaicu</div>
<div class="ml" style="top:76%;left:36%">Râul Mureș</div>
${IS.map(i=>{const p=xy(i.lat,i.lng),t=TY.find(x=>x.id===i.type)||TY[0];return`<div class="pin" style="left:${p.x}%;top:${p.y}%" onclick="event.stopPropagation();SEL=${i.id};R()" title="${i.title}">${t.e}<div class="pvote">${i.votes}</div></div>`;}).join("")}
${PIN?`<div style="position:absolute;left:${PIN.px}%;top:${PIN.py}%;transform:translate(-50%,-50%);width:12px;height:12px;background:#FF6B35;border-radius:50%;border:2px solid #fff;z-index:5"></div>`:""}
<div style="position:absolute;bottom:8px;left:10px;background:rgba(0,0,0,.7);padding:4px 10px;border-radius:6px;font-size:11px;color:#8B92A8">Click pe hartă pentru a raporta</div>
</div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><strong>Cele mai votate</strong><button class="btn g" onclick="nav('issues')">Vezi toate →</button></div>
${[...ac].sort((a,b)=>b.votes-a.votes).slice(0,3).map(i=>IC(i)).join("")}
</div>`;}
else if(PG==="issues"||PG==="resolved"){
const list=(PG==="resolved"?rs:ac).sort((a,b)=>b.votes-a.votes);
h+=`<div class="page">${list.length===0?`<div style="text-align:center;padding:40px;color:#555D75"><div style="font-size:40px">🎉</div><p style="margin-top:8px">Nu există probleme</p></div>`:list.map(i=>IC(i)).join("")}</div>`;}
else if(PG==="admin"){
if(!ADM){h+=`<div class="page"><div style="max-width:360px;margin:40px auto;background:#12151C;border:1px solid #7C4DFF;border-radius:16px;padding:32px">
<div style="text-align:center;margin-bottom:20px"><div style="font-size:36px">🛡️</div><div style="font-size:20px;font-weight:800;color:#7C4DFF;margin-top:8px">Admin Portal</div></div>
<div class="fg"><label class="fl">Parolă</label><input class="fi" id="APW" type="password" onkeydown="if(event.key==='Enter')LG()"/></div>
<button class="btn pu" style="width:100%;padding:11px" onclick="LG()">🔓 Intră în Admin</button>
<p style="text-align:center;margin-top:10px;font-size:11px;color:#555D75">Parola: Arad2026Admin!</p>
</div></div>`;}
else{h+=`<div class="page">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
<div style="font-size:20px;font-weight:800">🛡️ Admin Dashboard</div>
<button class="btn g" onclick="ADM=false;R()">🚪 Ieși</button></div>
<div class="g4">
<div class="sc"><div class="sv" style="color:#FF1744">${ac.length}</div><div class="sl">Active</div></div>
<div class="sc"><div class="sv" style="color:#00E676">${rs.length}</div><div class="sl">Rezolvate</div></div>
<div class="sc"><div class="sv" style="color:#00E5FF">${IS.reduce((a,i)=>a+i.votes,0)}</div><div class="sl">Voturi</div></div>
<div class="sc"><div class="sv" style="color:#7C4DFF">${Math.round(rs.length/Math.max(IS.length,1)*100)}%</div><div class="sl">Rezolvare</div></div>
</div>
<div style="background:#12151C;border:1px solid #2A2F3E;border-radius:10px;overflow:hidden;overflow-x:auto">
<table class="tbl"><thead><tr>${["Tip","Titlu","Data","Status","Voturi","Acțiuni"].map(h=>`<th>${h}</th>`).join("")}</tr></thead>
<tbody>${IS.map(i=>{const t=TY.find(x=>x.id===i.type)||TY[0];return`<tr>
<td><span class="tg" style="background:${t.c}22;color:${t.c}">${t.e} ${t.l}</span></td>
<td style="font-weight:700">${i.title}</td>
<td style="font-size:11px;color:#8B92A8">${i.date}</td>
<td><span class="sb" style="background:${i.status==="resolved"?"rgba(0,230,118,.15)":"rgba(255,107,53,.15)"};color:${i.status==="resolved"?"#00E676":"#FF6B35"}">${i.status==="resolved"?"✅":"🔴"}</span></td>
<td style="font-weight:700;color:#FF6B35">${i.votes}▲</td>
<td><div style="display:flex;gap:6px">
${i.status==="active"?`<button class="btn gr" style="padding:4px 8px;font-size:11px" onclick="RV(${i.id})">✅</button>`:""}
<button class="btn rd" style="padding:4px 8px;font-size:11px" onclick="DL(${i.id})">🗑️</button>
</div></td></tr>`;}).join("")}</tbody></table></div></div>`;}}
h+=`</div></div>`;
if(FRM&&PIN){
const nr=IS.find(i=>i.status==="active"&&hav(PIN.lat,PIN.lng,i.lat,i.lng)<=20);
h+=`<div class="ov" onclick="FRM=false;PIN=null;R()"><div class="dl" onclick="event.stopPropagation()">
<h3>🚨 Raportează problemă</h3>
${nr?`<div style="background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.3);border-radius:8px;padding:12px;margin-bottom:14px">
<div style="color:#00E5FF;font-weight:700;margin-bottom:8px">⚠️ Există deja un raport în zonă (20m)!</div>
<button class="btn gr" onclick="VT.includes(${nr.id})?0:(VT=[...VT,${nr.id}],IS=IS.map(i=>i.id===${nr.id}?{...i,votes:i.votes+1}:i));FRM=false;PIN=null;toast('Vot înregistrat!','▲')">▲ Votează raportul existent</button>
</div>`:""}
<div style="background:#1A1E28;border-radius:6px;padding:8px 12px;font-size:11px;color:#00E5FF;margin-bottom:14px">📍 ${PIN.lat.toFixed(5)}°N, ${PIN.lng.toFixed(5)}°E</div>
<div class="fg"><label class="fl">Tip problemă</label><div class="tg2">
${TY.map(t=>`<div class="to${FT===t.id?" on":""}" onclick="FT='${t.id}';R()" style="${FT===t.id?`border-color:${t.c};color:${t.c}`:""}"><span style="font-size:16px">${t.e}</span>${t.l}</div>`).join("")}
</div></div>
<div class="fg"><label class="fl">Titlu *</label><input class="fi" id="FTI" placeholder="Descrie pe scurt problema..." maxlength="100"/></div>
<div class="fg"><label class="fl">Descriere</label><textarea class="fi" id="FDE" rows="3" placeholder="Detalii..."></textarea></div>
<div class="note">🔒 Nu este necesar un cont.</div>
<div style="display:flex;gap:8px">
<button class="btn g" style="flex:1" onclick="FRM=false;PIN=null;R()">Anulează</button>
<button class="btn p" style="flex:1" onclick="SF()">📤 Trimite</button>
</div></div></div>`;}
if(SEL!==null){
const i=IS.find(x=>x.id===SEL);
if(i){const t=TY.find(x=>x.id===i.type)||TY[0];const v=VT.includes(i.id);
h+=`<div class="ov" onclick="SEL=null;R()"><div class="dl" onclick="event.stopPropagation()">
<h3>${i.title}</h3>
<div style="margin-bottom:12px">
<span class="tg" style="background:${t.c}22;color:${t.c}">${t.e} ${t.l}</span>
<span class="sb" style="margin-left:6px;background:${i.status==="resolved"?"rgba(0,230,118,.15)":"rgba(255,107,53,.15)"};color:${i.status==="resolved"?"#00E676":"#FF6B35"}">${i.status==="resolved"?"✅ Rezolvat":"🔴 Activ"}</span>
</div>
<p style="font-size:13px;color:#8B92A8;line-height:1.6;margin-bottom:14px">${i.desc}</p>
<div style="font-size:11px;color:#555D75;margin-bottom:14px">📅 ${i.date} · 📍 ${i.lat.toFixed(4)}°N</div>
<div style="display:flex;gap:8px;margin-bottom:12px">
<button class="btn ${v?"p":"g"}" style="flex:1" onclick="VO(${i.id})">${v?"▲ Votat":"▲ Votează"} · ${i.votes}</button>
${i.status==="active"?`<button class="btn gr" style="flex:1" onclick="RV(${i.id})">✅ Rezolvat</button>`:""}
</div>
<button class="btn g" style="width:100%" onclick="SEL=null;R()">Închide</button>
</div></div>`;}}
if(TST){h+=`<div class="toast"><span style="font-size:18px">${TST.i}</span>${TST.m}</div>`;}
document.getElementById("R").innerHTML=h;}
function IC(i){const t=TY.find(x=>x.id===i.type)||TY[0];const v=VT.includes(i.id);
return`<div class="ic" onclick="SEL=${i.id};R()">
<div class="vc"><div class="vb${v?" on":""}" onclick="event.stopPropagation();VO(${i.id})">▲</div><div class="vn">${i.votes}</div><div class="vl">voturi</div></div>
<div class="ib"><span class="tg" style="background:${t.c}22;color:${t.c}">${t.e} ${t.l}</span><div class="it">${i.title}</div><div class="id">${i.desc}</div><div class="im">📅 ${i.date}</div></div></div>`;}
function nav(p){PG=p;SEL=null;R();}
function MC(e){const m=document.getElementById("MP");if(!m)return;const r=m.getBoundingClientRect();const px=((e.clientX-r.left)/r.width)*100;const py=((e.clientY-r.top)/r.height)*100;PIN={lat:CX+(50-py)/800,lng:CY+(px-50)/560,px,py};FT="crack";FRM=true;R();}
function SF(){const ti=document.getElementById("FTI")?.value?.trim();const de=document.getElementById("FDE")?.value?.trim();if(!ti)return;IS=[{id:Date.now(),type:FT,title:ti,desc:de||"",lat:PIN.lat,lng:PIN.lng,votes:0,status:"active",date:new Date().toISOString().split("T")[0]},...IS];FRM=false;PIN=null;toast("Problemă raportată!","🚨");}
function VO(id){const a=VT.includes(id);VT=a?VT.filter(v=>v!==id):[...VT,id];IS=IS.map(i=>i.id===id?{...i,votes:i.votes+(a?-1:1)}:i);if(!a)toast("Vot înregistrat!","▲");else R();}
